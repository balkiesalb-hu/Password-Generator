<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Changa+One:ital@0;1&family=Pliant:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>  
    <div class="container">
        <h2>Generator a <br><span>random password</span></h2>
        <p>Never use an insecure password again</p>
         
        <div class="existing-el">
                <div class="numberfild">
                    <label for="checkbox-number" class="number-exist">
                        <input checked type="checkbox" class="input-class" id="checkbox-number">
                        <span class="circle circle-number"></span>
                    </label>
                    <label for="checkbox-number" class="number-name">numbers</label>
                </div>
                <div class="symbolfild">
                    <label for="checkbox-symbol" class="symbol-exist">
                        <input checked type="checkbox" class="input-class" id="checkbox-symbol">
                        <span class="circle circle-symbol"></span>
                    </label> 
                    <label for="checkbox-symbol" class="symbol-name">symbols</label>
                </div>
        </div>
           
        <div class="len-pass">
            <label for="length-password">Length of Passwrod :</label>
            <input type="number" id="length-password" min="1" max="40" placeholder="15" value="15">


        </div>

        <button id="generat-btn">Generate Password</button>
       
        <hr color="" >

        <div class="password-list">
            <div class="passwrod-div" id="password1-el"></div>
            <div class="passwrod-div" id="passwrod2-el"></div>
        </div>


    </div>
    
    <script src="index.js"></script>
</body>
</html>
